<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — DADRIS DESIGNERS</title>
  <link rel="icon" href="../images/logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #060e07, #0a1a0e, #0d2b14); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .grid-bg { position: fixed; inset: 0; opacity: .03; background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
    .login-card { background: #fff; border-radius: 24px; overflow: hidden; width: 420px; max-width: 94vw; box-shadow: 0 32px 80px rgba(0,0,0,0.5); position: relative; z-index: 1; }
    .login-header { background: linear-gradient(135deg, #0a1a0e, #1a8c2e); padding: 40px 36px; text-align: center; position: relative; overflow: hidden; }
    .login-header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: rgba(255,255,255,0.04); border-radius: 50%; }
    .admin-badge { display: inline-block; background: rgba(255,255,255,0.15); color: #fff; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 5px 16px; border-radius: 50px; margin-bottom: 14px; }
    .login-header img { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 14px; display: block; border: 3px solid rgba(255,255,255,0.25); }
    .login-header h1 { color: #fff; font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; }
    .login-header p { color: rgba(255,255,255,0.6); font-size: 0.82rem; margin-top: 5px; }
    .login-body { padding: 36px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.83rem; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; }
    .form-group input { width: 100%; padding: 13px 16px; border: 2px solid #e2e8e4; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; transition: border-color .25s; color: #1a1a1a; }
    .form-group input:focus { outline: none; border-color: #1a8c2e; box-shadow: 0 0 0 4px rgba(26,140,46,0.1); }
    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 46px; }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #9aaba0; background: none; border: none; font-size: 1rem; }
    .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, #1a8c2e, #22a838); color: #fff; border: none; border-radius: 50px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: .25s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,140,46,0.35); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
    .error-msg { background: #fce4ec; color: #c62828; padding: 12px 16px; border-radius: 12px; font-size: 0.84rem; margin-bottom: 16px; border-left: 4px solid #e53935; display: none; }
    .info-box { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; font-size: 0.82rem; color: #2e7d32; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .login-footer { text-align: center; padding: 0 36px 28px; font-size: 0.82rem; color: #6b7c70; }
    .login-footer a { color: #1a8c2e; font-weight: 600; text-decoration: none; }
    .firebase-badge { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 16px; font-size: 0.72rem; color: #9aaba0; }
    .firebase-badge .fb-tag { background: #fff3e0; color: #e65100; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 0.68rem; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="login-card">
    <div class="login-header">
      <div class="admin-badge">🔐 Admin Access</div>
      <img src="../images/logo.jpg" alt="DADRIS DESIGNERS" />
      <h1>DADRIS DESIGNERS</h1>
      <p>Admin Dashboard — Secure Login</p>
    </div>
    <div class="login-body">
      <div class="info-box" id="setupInfo">
        <strong>⚙️ First-time setup?</strong> See the README.txt file for instructions on creating your admin account in Firebase.
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <form id="adminLoginForm">
        <div class="form-group">
          <label><i class="fas fa-envelope" style="color:#1a8c2e;margin-right:6px;"></i>Admin Email</label>
          <input type="email" id="adminEmail" placeholder="dadrisdesigners@gmail.com" required autocomplete="off" value="dadrisdesigners@gmail.com" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock" style="color:#1a8c2e;margin-right:6px;"></i>Password</label>
          <div class="input-wrap">
            <input type="password" id="adminPass" placeholder="Your Firebase password" required />
            <button type="button" class="toggle-pw" onclick="togglePw()">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>
      </form>
    </div>
    <div class="login-footer">
      <div class="firebase-badge">
        <i class="fas fa-shield-alt"></i> Secured by <span class="fb-tag">Firebase</span> — Works on any device
      </div>
      <p style="margin-top:12px;"><a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYcrazrmkXJXaRMBUzTZFBOwS2BUxs3QQ",
      authDomain: "dadris-designers.firebaseapp.com",
      projectId: "dadris-designers",
      storageBucket: "dadris-designers.firebasestorage.app",
      messagingSenderId: "813719033161",
      appId: "1:813719033161:web:ee55f44da47a7748793698"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If already logged in → go to dashboard
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('setupInfo').style.display = 'none';
        window.location.href = 'dashboard.html';
      }
    });

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value.trim();
      const pass  = document.getElementById('adminPass').value;
      const btn   = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';
      errEl.style.display = 'none';

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = 'dashboard.html';
      } catch (err) {
        let msg = 'Login failed. Please check your credentials.';
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
          msg = '❌ Incorrect email or password. Please try again.';
        } else if (err.code === 'auth/too-many-requests') {
          msg = '⚠️ Too many failed attempts. Wait a few minutes and try again.';
        } else if (err.code === 'auth/network-request-failed') {
          msg = '🌐 No internet connection. Please check your network.';
        }
        errEl.textContent = msg;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
      }
    });

    window.togglePw = function() {
      const inp  = document.getElementById('adminPass');
      const icon = document.getElementById('eyeIcon');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      icon.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    };
  </script>
</body>
</html>
